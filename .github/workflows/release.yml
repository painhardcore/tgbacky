name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9] ]]; then
            echo "Release tag must start with v followed by a digit, for example v0.1.0" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-${{ runner.os }}-${{ runner.arch }}
          cache-on-failure: true

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: tgbacky
          - name: macos-x86_64
            os: macos-15-intel
            archive_ext: tar.gz
            binary_name: tgbacky
          - name: macos-aarch64
            os: macos-14
            archive_ext: tar.gz
            binary_name: tgbacky
          - name: windows-x86_64
            os: windows-latest
            archive_ext: zip
            binary_name: tgbacky.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-${{ runner.os }}-${{ runner.arch }}
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --locked --release

      - name: Smoke packaged binary
        shell: bash
        run: ./target/release/${{ matrix.binary_name }} --version

      - name: Prepare package directory
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ inputs.tag }}"
          fi
          VERSION="${RELEASE_TAG#v}"
          PACKAGE_DIR="dist/tgbacky-v${VERSION}-${{ matrix.name }}"
          mkdir -p "$PACKAGE_DIR"
          cp README.md LICENSE env.example "$PACKAGE_DIR"/
          cp target/release/${{ matrix.binary_name }} "$PACKAGE_DIR"/
          echo "PACKAGE_DIR=$PACKAGE_DIR" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASENAME=tgbacky-v${VERSION}-${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Create tar.gz archive
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          tar -C dist -czf "dist/${ARCHIVE_BASENAME}.tar.gz" "${ARCHIVE_BASENAME}"

      - name: Create zip archive
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:PACKAGE_DIR" -DestinationPath "dist/$env:ARCHIVE_BASENAME.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_BASENAME }}
          path: |
            dist/${{ env.ARCHIVE_BASENAME }}.${{ matrix.archive_ext }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
